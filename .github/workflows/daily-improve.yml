name: Daily AI Improvement

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily improvement
        run: python scripts/daily_improve.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
